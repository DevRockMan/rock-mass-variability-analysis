<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#080c10"/>
  <!-- Accent bar top -->
  <rect x="0" y="0" width="512" height="16" rx="8" fill="#e8a020"/>

  <!-- Mountain silhouette -->
  <polygon points="256,80 108,340 404,340" fill="none" stroke="#e8a020" stroke-width="18" stroke-linejoin="round"/>
  <!-- Inner peak detail -->
  <polygon points="256,80 180,240 332,240" fill="#1a2230"/>

  <!-- Rock strata lines -->
  <line x1="130" y1="310" x2="382" y2="310" stroke="#2e3d50" stroke-width="5"/>
  <line x1="150" y1="280" x2="362" y2="280" stroke="#2e3d50" stroke-width="4"/>
  <line x1="175" y1="250" x2="337" y2="250" stroke="#2e3d50" stroke-width="3"/>

  <!-- Probability curve (bottom arc) -->
  <path d="M 80 420 Q 160 360 256 390 Q 352 420 432 370"
        fill="none" stroke="#4090e8" stroke-width="8" stroke-linecap="round"/>

  <!-- Monte Carlo dots -->
  <circle cx="140" cy="415" r="6"  fill="#e8a020" opacity="0.9"/>
  <circle cx="200" cy="385" r="5"  fill="#e8a020" opacity="0.7"/>
  <circle cx="256" cy="390" r="7"  fill="#e8a020"/>
  <circle cx="310" cy="400" r="5"  fill="#e8a020" opacity="0.7"/>
  <circle cx="370" cy="378" r="6"  fill="#e8a020" opacity="0.9"/>

  <!-- Small sigma label -->
  <text x="256" y="478" font-family="monospace" font-size="38" font-weight="700"
        fill="#607080" text-anchor="middle" letter-spacing="4">RMVA</text>
</svg>
