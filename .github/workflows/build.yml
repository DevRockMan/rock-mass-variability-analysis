name: Build & Package RMVA

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 1.0.0)"
        required: false

jobs:
  # ── Generate icons (run once, share via artifact) ──────────────────────
  icons:
    name: Generate Icons
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install icon deps
        working-directory: .
        run: npm install --save-dev sharp png-to-ico

      - name: Install librsvg
        run: sudo apt-get install -y librsvg2-bin

      - name: Generate icons
        working-directory: .
        run: node scripts/generate-icons.js

      - name: Upload icons
        uses: actions/upload-artifact@v4
        with:
          name: icons
          path: assets/icon.*

  # ── Windows build ───────────────────────────────────────────────────────
  build-windows:
    name: Windows (NSIS + Portable)
    runs-on: windows-latest
    needs: icons
    steps:
      - uses: actions/checkout@v4

      - name: Download icons
        uses: actions/download-artifact@v4
        with:
          name: icons
          path: assets/

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Node dependencies
        working-directory: .
        run: npm install

      - name: Setup Python environment (bundled venv)
        working-directory: .
        run: node scripts/setup-python.js

      - name: Build Windows installers
        working-directory: .
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: release/*.{exe,zip}

  # ── macOS build ─────────────────────────────────────────────────────────
  build-macos:
    name: macOS (DMG + ZIP)
    runs-on: macos-latest
    needs: icons
    steps:
      - uses: actions/checkout@v4

      - name: Download icons
        uses: actions/download-artifact@v4
        with:
          name: icons
          path: assets/

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Node dependencies
        working-directory: .
        run: npm install

      - name: Generate .icns
        working-directory: .
        run: node scripts/generate-icons.js


      - name: Setup Python environment (bundled venv)
        working-directory: .
        run: node scripts/setup-python.js

      - name: Build macOS installers
        working-directory: .
        run: npm run dist:mac
        env:
          GH_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false   # skip code-signing in CI

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dist
          path: release/*.zip

  # ── Linux build ─────────────────────────────────────────────────────────
  build-linux:
    name: Linux (AppImage + deb + rpm)
    runs-on: ubuntu-22.04
    needs: icons
    steps:
      - uses: actions/checkout@v4

      - name: Download icons
        uses: actions/download-artifact@v4
        with:
          name: icons
          path: assets/

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y rpm fakeroot

      - name: Install Node dependencies
        working-directory: .
        run: npm install

      - name: Setup Python environment (bundled venv)
        working-directory: .
        run: node scripts/setup-python.js

      - name: Build Linux packages
        working-directory: .
        run: npm run dist:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-dist
          path: release/*.{AppImage,deb,rpm}

  # ── Release ─────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/') 
    permissions:
      contents: write
    steps:
      - name: Download all dist artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-all/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-all/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
